<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Theme colors -->
    <meta name="theme-color"            content="#8B1A1A" />
    <meta name="msapplication-TileColor" content="#8B1A1A" />

    <!-- SEO / sharing -->
    <meta name="description"  content="Scan the QR code at your table to browse our menu and place your order." />
    <meta name="author"       content="QR Menu System" />
    <meta property="og:title"       content="Digital Restaurant Menu" />
    <meta property="og:description" content="Browse our full menu and place your order right from your phone." />
    <meta property="og:type"        content="website" />

    <!-- Fonts — Playfair Display, DM Sans, Dancing Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Dancing+Script:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>QR Menu — Digital Restaurant Menu</title>
  </head>
  <body>
    <noscript>
      <div style="font-family:sans-serif;padding:2rem;text-align:center;color:#8B1A1A;">
        Please enable JavaScript to use this digital menu.
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
